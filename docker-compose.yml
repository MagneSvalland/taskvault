version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: taskvault-db
    environment:
      POSTGRES_DB: taskvault
      POSTGRES_USER: taskvault
      POSTGRES_PASSWORD: taskvault123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskvault"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: taskvault-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/taskvault
      SPRING_DATASOURCE_USERNAME: taskvault
      SPRING_DATASOURCE_PASSWORD: taskvault123
      JWT_SECRET: taskvault-super-secret-key-minimum-256-bits-long-for-hs256
      JWT_EXPIRATION: 86400000
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: